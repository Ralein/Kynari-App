[project]
name = "kynari-api"
version = "0.2.0"
description = "Kynari — Privacy-first baby need detection API"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "psycopg[binary]>=3.2.0",
    "psycopg-pool>=3.2.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.6.0",
    "python-jose[cryptography]>=3.3.0",
    "httpx>=0.28.0",
    "stripe>=11.0.0",
    "anthropic>=0.40.0",
    # ML dependencies for baby need detection
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "torchaudio>=2.0.0",
    "transformers>=4.35.0",
    "librosa>=0.10.0",
    "soundfile>=0.12.0",
    "Pillow>=10.0.0",
    "python-multipart>=0.0.6",
    "numpy>=1.24.0",
    "matplotlib>=3.8.0",
    # Face analysis (DeepFace wraps RetinaFace + emotion classifier)
    "deepface>=0.0.93",
    "tf-keras>=2.16.0",
    "opencv-python>=4.8.0",
    # AI reports
    "langchain-core>=0.1.0",
    "langchain-anthropic>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.0",
]
